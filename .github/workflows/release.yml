name: Build Installers

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ${{ matrix.os }}
    
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
            npm_script: dist:win
          - os: ubuntu-latest
            platform: linux
            npm_script: dist:linux

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Linux Dependencies (Ubuntu)
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            python3 \
            make \
            g++ \
            pkg-config \
            fakeroot \
            dpkg \
            libasound2-dev \
            libx11-dev \
            libxkbfile-dev \
            libxi-dev \
            libxtst-dev \
            libudev-dev
          sudo apt-get install -y libfuse2 || sudo apt-get install -y libfuse2t64

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust Dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: audio-engine-rust

      - name: Compile Rust Engine (Windows)
        if: matrix.platform == 'win'
        shell: bash
        run: |
          cd audio-engine-rust
          cargo build --release
          mkdir -p ../bin
          cp target/release/lf-audio-engine.exe ../bin/

      - name: Compile Rust Engine (Linux)
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          cd audio-engine-rust
          cargo build --release
          mkdir -p ../bin
          cp target/release/lf-audio-engine ../bin/
          chmod +x ../bin/lf-audio-engine

      - name: Install NPM Dependencies
        run: npm ci

      - name: Rebuild Native Node Modules
        run: npx electron-rebuild -f -w better-sqlite3

      - name: Build Electron App (${{ matrix.platform }})
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run ${{ matrix.npm_script }}
        
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lf-automatizador-${{ matrix.platform }}-${{ runner.arch }}
          if-no-files-found: error
          path: |
            dist/*.exe
            dist/*.deb
            dist/*.AppImage
